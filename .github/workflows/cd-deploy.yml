name: CD - Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:

  build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: maven

      - name: Build and Push with Jib
        run: |
          ./mvnw compile jib:build \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

      - name: Delete untagged package versions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG_NAME: ${{ github.event.repository.name }}
        run: |
          echo "开始清理没有标签的镜像..."
          
          # 获取所有版本及标签信息
          versions=$(gh api -H "Accept: application/vnd.github+json" \
            /user/packages/container/$PKG_NAME/versions --paginate \
            --jq '.[] | {id: .id, tags: .metadata.container.tags}')
            
          echo "$versions" | jq -c '.' | while read -r version; do
            id=$(echo $version | jq -r '.id')
            tags=$(echo $version | jq -r '.tags[] // empty')
            
            # 逻辑：如果没有标签，或者标签列表中不包含任何版本标签(v开头的)，则删除
            # 这里保留 latest, v2-latest 以及任何 v1.0, v2.1 等版本标签
            if [ -z "$tags" ]; then
              echo "发现无标签镜像 $id，正在删除..."
              gh api -X DELETE -H "Accept: application/vnd.github+json" \
                /user/packages/container/$PKG_NAME/versions/$id
            else
              echo "镜像 $id 拥有标签: $tags，保留。"
            fi
          done 
